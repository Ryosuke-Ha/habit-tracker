name: Auto Create PR

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'refactor/**'
      - 'docs/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # 既にPRが存在する場合はスキップ
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            exit 0
          fi

          # ブランチ名からタイトルを生成
          # feature/issue-42-add-coaching → feat: add coaching (#42)
          TITLE=$(echo "$BRANCH_NAME" | sed 's|feature/issue-\([0-9]*\)-\(.*\)|feat: \2 (#\1)|' \
                                      | sed 's|fix/issue-\([0-9]*\)-\(.*\)|fix: \2 (#\1)|' \
                                      | sed 's|refactor/issue-\([0-9]*\)-\(.*\)|refactor: \2 (#\1)|' \
                                      | sed 's|docs/issue-\([0-9]*\)-\(.*\)|docs: \2 (#\1)|' \
                                      | sed 's|-| |g')

          # Issue番号を抽出
          ISSUE_NUMBER=$(echo "$BRANCH_NAME" | grep -oP '(?<=issue-)\d+' || echo "")

          # PR本文を生成
          if [ -n "$ISSUE_NUMBER" ]; then
            BODY="closes #${ISSUE_NUMBER}

          ## 変更内容
          <!-- 何を変更したか簡潔に -->

          ## テスト
          - [ ] 既存テストが通る
          - [ ] 手動動作確認済み"
          else
            BODY="## 変更内容
          <!-- 何を変更したか簡潔に -->

          ## テスト
          - [ ] 既存テストが通る
          - [ ] 手動動作確認済み"
          fi

          # PRを作成
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH_NAME"

          echo "PR created successfully"
