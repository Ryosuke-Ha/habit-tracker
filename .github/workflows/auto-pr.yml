name: Auto Create PR

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'refactor/**'
      - 'docs/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          # 既にPRが存在する場合はスキップ
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists: #$EXISTING_PR"
            exit 0
          fi

          # ブランチ名からタイトルを生成
          # feature/issue-42-add-coaching → feat: add coaching (#42)
          TITLE=$(echo "$BRANCH_NAME" | sed 's|feature/issue-\([0-9]*\)-\(.*\)|feat: \2 (#\1)|' \
                                      | sed 's|fix/issue-\([0-9]*\)-\(.*\)|fix: \2 (#\1)|' \
                                      | sed 's|refactor/issue-\([0-9]*\)-\(.*\)|refactor: \2 (#\1)|' \
                                      | sed 's|docs/issue-\([0-9]*\)-\(.*\)|docs: \2 (#\1)|' \
                                      | sed 's|-| |g')

          # Issue番号を抽出
          ISSUE_NUMBER=$(echo "$BRANCH_NAME" | grep -oP '(?<=issue-)\d+' || echo "")

          # mainとの差分からコミット一覧・変更ファイルを取得
          COMMITS=$(git log origin/main..HEAD --oneline | head -20)
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | head -30)

          # コミットが空の場合のフォールバック
          if [ -z "$COMMITS" ]; then
            COMMITS="（コミット情報を取得できませんでした）"
          fi
          if [ -z "$CHANGED_FILES" ]; then
            CHANGED_FILES="（変更ファイルを取得できませんでした）"
          fi

          # ブランチ名から変更種別チェックボックスを生成
          if [[ "$BRANCH_NAME" == feature/* ]]; then
            CHANGE_TYPE="- [ ] Bug fix
          - [x] New feature
          - [ ] Refactor
          - [ ] Docs
          - [ ] CI/CD"
          elif [[ "$BRANCH_NAME" == fix/* ]]; then
            CHANGE_TYPE="- [x] Bug fix
          - [ ] New feature
          - [ ] Refactor
          - [ ] Docs
          - [ ] CI/CD"
          elif [[ "$BRANCH_NAME" == refactor/* ]]; then
            CHANGE_TYPE="- [ ] Bug fix
          - [ ] New feature
          - [x] Refactor
          - [ ] Docs
          - [ ] CI/CD"
          elif [[ "$BRANCH_NAME" == docs/* ]]; then
            CHANGE_TYPE="- [ ] Bug fix
          - [ ] New feature
          - [ ] Refactor
          - [x] Docs
          - [ ] CI/CD"
          else
            CHANGE_TYPE="- [ ] Bug fix
          - [ ] New feature
          - [ ] Refactor
          - [ ] Docs
          - [ ] CI/CD"
          fi

          # PR本文を生成
          ISSUE_LINE=""
          if [ -n "$ISSUE_NUMBER" ]; then
            ISSUE_LINE="## 関連Issue
          closes #${ISSUE_NUMBER}

          "
          fi

          BODY="${ISSUE_LINE}## 変更内容
          ${COMMITS}

          ## 変更ファイル
          \`\`\`
          ${CHANGED_FILES}
          \`\`\`

          ## 変更の種類
          ${CHANGE_TYPE}

          ## テスト
          - [ ] 既存テストが通る（pytest・jest）
          - [ ] 手動動作確認済み"

          # PRを作成
          gh pr create \
            --title "$TITLE" \
            --body "$BODY" \
            --base main \
            --head "$BRANCH_NAME"

          echo "PR created successfully"
